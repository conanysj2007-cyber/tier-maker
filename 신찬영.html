<!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
<div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)" id="투썸_신찬영">
    <img src="./images/투썸.png" alt="투썸플레이스">
    <div class="item-name">투썸플레이스</div>
</div>

<div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)" id="빽다방_신찬영">
    <img src="./images/백다방.png" alt="빽다방">
    <div class="item-name">빽다방</div>
</div>

<div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)" id="메가_신찬영">
